<div class="dashboard">
  <div class="dashboard__header">
    <div>
      <h1 class="dashboard__title">Customer Engagement</h1>
      <p class="dashboard__subtitle">User activity and engagement metrics</p>
    </div>
    <div class="dashboard__actions">
      <button class="dashboard__refresh-btn" (click)="load()"><ion-icon name="refresh-outline"></ion-icon> Refresh</button>
    </div>
  </div>

  <div class="dashboard__loading" *ngIf="loading">Loading dashboard...</div>

  <ng-container *ngIf="!loading">
    <div class="dashboard__metrics">
      <app-metric-card label="Total Users" [value]="totalUsers | number" icon="people-outline" iconBg="#003377"></app-metric-card>
      <app-metric-card label="Total Transactions" [value]="totalTransactions | number" icon="swap-horizontal-outline" iconBg="#059669"></app-metric-card>
      <app-metric-card label="Avg Txns Per User" [value]="avgTxnsPerUser" icon="stats-chart-outline" iconBg="#7c3aed"></app-metric-card>
      <app-metric-card label="Referral Codes" [value]="referralCodes" icon="gift-outline" iconBg="#6b7280"></app-metric-card>
    </div>
  </ng-container>
</div>
