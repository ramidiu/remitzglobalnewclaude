<VirtualHost 68.169.59.140:80>
    ServerName api.remitz.com
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8080/
    ProxyPassReverse / http://127.0.0.1:8080/
</VirtualHost>
<VirtualHost 68.169.59.140:443>
    ServerName api.remitz.com
    SSLEngine on
    SSLCertificateFile "/var/www/httpd-cert/remitz/*.remitz.com_custom_1.crt"
    SSLCertificateKeyFile "/var/www/httpd-cert/remitz/*.remitz.com_custom_1.key"
    SSLCertificateChainFile "/var/www/httpd-cert/remitz/*.remitz.com_custom_1.ca"
    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8080/
    ProxyPassReverse / http://127.0.0.1:8080/
</VirtualHost>
