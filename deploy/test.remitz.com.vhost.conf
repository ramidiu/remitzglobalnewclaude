server {
    listen 68.169.55.246:80;
    server_name test.remitz.com www.test.remitz.com;

    root /var/www/remitz/data/www/test.remitz.com;
    index index.html;

    access_log /var/www/httpd-logs/test.remitz.com.access.log;
    error_log  /var/www/httpd-logs/test.remitz.com.error.log notice;

    gzip on;
    gzip_comp_level 5;
    gzip_disable "msie6";
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    client_max_body_size 25M;

    location /api/ {
        proxy_pass         http://127.0.0.1:8085/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /actuator/ {
        proxy_pass http://127.0.0.1:8085/actuator/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 68.169.55.246:443 ssl;
    server_name test.remitz.com www.test.remitz.com;

    ssl_certificate     "/var/www/httpd-cert/remitz/test.remitz.com_le2.crt";
    ssl_certificate_key "/var/www/httpd-cert/remitz/test.remitz.com_le2.key";
    ssl_ciphers EECDH:+AES256:-3DES:RSA+AES:!NULL:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_dhparam /etc/ssl/certs/dhparam4096.pem;

    root /var/www/remitz/data/www/test.remitz.com;
    index index.html;

    access_log /var/www/httpd-logs/test.remitz.com.access.log;
    error_log  /var/www/httpd-logs/test.remitz.com.error.log notice;

    gzip on;
    gzip_comp_level 5;
    gzip_disable "msie6";
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    client_max_body_size 25M;

    location /api/ {
        proxy_pass         http://127.0.0.1:8085/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /actuator/ {
        proxy_pass http://127.0.0.1:8085/actuator/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
