# =============================================================================
# nginx site for remitz.com
#   - Serves the Angular static build
#   - Proxies /api/  and /actuator/  to the dockerised LIVE backend (127.0.0.1:8087)
#
# Put this at:  /etc/nginx/conf.d/remitz.com.conf
# (If you use ISPmanager, add the two location blocks below into the panel's
#  vhost instead, so the panel doesn't overwrite this file.)
#
# Then:  nginx -t && systemctl reload nginx
# SSL:   certbot --nginx -d remitz.com -d www.remitz.com
# =============================================================================

server {
    listen 80;
    server_name remitz.com www.remitz.com;

    root  /var/www/remitz/data/www/remitz.com;
    index index.html;

    gzip on;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;

    # KYC uploads & document previews can be large
    client_max_body_size 25M;

    # Backend API (dockerised LIVE backend on localhost:8087)
    location /api/ {
        proxy_pass         http://127.0.0.1:8087/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Spring actuator (optional; restrict or remove in prod if not needed)
    location /actuator/ {
        proxy_pass http://127.0.0.1:8087/actuator/;
    }

    # Angular SPA — client-side routing fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't let index.html get cached (so new deploys show immediately)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
