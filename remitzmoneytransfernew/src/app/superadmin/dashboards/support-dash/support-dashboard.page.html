<div class="dashboard">
  <div class="dashboard__header">
    <div>
      <h1 class="dashboard__title">Support</h1>
      <p class="dashboard__subtitle">Ticket overview and open issues</p>
    </div>
    <div class="dashboard__actions">
      <button class="dashboard__refresh-btn" (click)="load()"><ion-icon name="refresh-outline"></ion-icon> Refresh</button>
    </div>
  </div>

  <div class="dashboard__loading" *ngIf="loading">Loading dashboard...</div>

  <ng-container *ngIf="!loading">
    <div class="dashboard__metrics">
      <app-metric-card label="Total Tickets" [value]="totalTickets | number" icon="ticket-outline" iconBg="#1B3571"></app-metric-card>
      <app-metric-card label="Open Tickets" [value]="openTickets | number" icon="alert-circle-outline" iconBg="#f59e0b"></app-metric-card>
      <app-metric-card label="Resolved Tickets" [value]="resolvedTickets | number" icon="checkmark-done-outline" iconBg="#059669"></app-metric-card>
    </div>

    <div class="dashboard__charts">
      <app-chart-panel title="Tickets by Status" subtitle="Current distribution">
        <canvas baseChart [type]="statusChart.type" [data]="statusChart.data" [options]="statusChart.options" height="260"></canvas>
      </app-chart-panel>
    </div>

    <div class="dashboard__table-panel">
      <div class="dashboard__table-header">Latest Open Tickets (Top 10)</div>
      <table class="dashboard__table" *ngIf="latestOpen.length > 0">
        <thead>
          <tr>
            <th>Subject</th>
            <th>Priority</th>
            <th>Created</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let t of latestOpen">
            <td>{{ t.subject || t.title || '—' }}</td>
            <td>
              <span class="dashboard__badge" [ngClass]="{
                'dashboard__badge--danger': t.priority === 'HIGH' || t.priority === 'URGENT',
                'dashboard__badge--warning': t.priority === 'MEDIUM',
                'dashboard__badge--primary': t.priority === 'LOW'
              }">{{ t.priority || 'N/A' }}</span>
            </td>
            <td>{{ t.createdAt | date:'short' }}</td>
          </tr>
        </tbody>
      </table>
      <div class="dashboard__empty" *ngIf="latestOpen.length === 0">No open tickets</div>
    </div>
  </ng-container>
</div>
